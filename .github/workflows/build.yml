name: Build Kivy APK (Leaf Measure)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: Install System Dependencies
        run: apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-17-jdk git zip unzip colordiff ccache python3-pip python3-setuptools python3-virtualenv libffi-dev libssl-dev build-essential patch sudo

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Buildozer & Cython
        run: pip3 install --upgrade pip && pip3 install "cython<3.0.0" buildozer

      - name: Build Android APK
        run: export CFLAGS="-Wno-error=implicit-function-declaration" && yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaf-area-meter-apk
          path: bin/*.apk
