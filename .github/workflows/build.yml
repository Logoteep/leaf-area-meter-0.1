name: Build APK (No Camera)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git libffi-dev libssl-dev zip unzip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libltdl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" virtualenv buildozer
      
      - name: Setup Android SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"
          cd "$SDK_DIR"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p tools/bin
          ln -sf "$SDK_DIR/cmdline-tools/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/bin/avdmanager" "$SDK_DIR/tools/bin/avdmanager"
          yes | ./cmdline-tools/bin/sdkmanager --sdk_root="$SDK_DIR" --licenses
          ./cmdline-tools/bin/sdkmanager --sdk_root="$SDK_DIR" "build-tools;34.0.0" "platforms;android-33" "platform-tools"
      
      - name: Build APK
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          buildozer -v android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: leaf-apk
          path: bin/*.apk
